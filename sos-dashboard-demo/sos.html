<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One-Tap SOS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

<style>
  :root {
    --critical-color: #ff3b30;
    --high-color: #ff9500;
    --medium-color: #ffcc00;
    --bg-color: #0f0f13;
    --glass-bg: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
  }

  body { 
    background: var(--bg-color); 
    background-image: radial-gradient(circle at 50% 0%, rgba(255,59,48,0.08) 0%, transparent 60%);
    color: #fff; 
    font-family: 'Outfit', sans-serif; 
    margin: 0;
    padding: 20px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    min-height: 100vh;
  }

  .sos-container {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 40px;
    text-align: center;
    max-width: 400px;
    width: 100%;
  }

  h1 { 
    font-size: 32px;
    font-weight: 800;
  }

  p.subtitle {
    color: #aaa;
    margin-bottom: 20px;
  }

  #roomDisplay {
    margin-bottom: 20px;
    font-size: 18px;
    color: #00e0ff;
  }

  button { 
    width: 100%; 
    padding: 18px; 
    margin: 10px 0;
    border: none; 
    border-radius: 12px; 
    font-size: 18px; 
    font-weight: 600;
    cursor: pointer; 
    color: #fff;
  }

  #critical { background: #ff3b30; }
  #high { background: #ff9500; }
  #medium { background: #ffcc00; color: black; }

  #status { 
    margin-top: 20px; 
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="sos-container">
  <h1>Emergency SOS</h1>
  <p class="subtitle">Tap to send alert</p>

  <div id="roomDisplay"></div>

  <button id="critical">Critical SOS</button>
  <button id="high">High Alert</button>
  <button id="medium">Medium Alert</button>

  <div id="status"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
  import { 
    initializeFirestore,
    persistentLocalCache,
    collection, 
    addDoc, 
    serverTimestamp 
  } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDriQ0LoWT90BlzKhCvGF4kgW4cb24QhKU",
    authDomain: "vega-c7ee5.firebaseapp.com",
    projectId: "vega-c7ee5",
    storageBucket: "vega-c7ee5.firebasestorage.app",
    messagingSenderId: "1000278564320",
    appId: "1:1000278564320:web:42489358067051edd61f85"
  };

  const app = initializeApp(firebaseConfig);

  const db = initializeFirestore(app, {
    localCache: persistentLocalCache()
  });

  // ✅ DYNAMIC ROOM FROM URL
  const params = new URLSearchParams(window.location.search);
  const ROOM_NUMBER = params.get("room") || "Unknown";

  document.getElementById("roomDisplay").textContent = "Room: " + ROOM_NUMBER;

  async function sendAlert(severity) {
    try {
      await addDoc(collection(db, 'alerts'), {
        room: ROOM_NUMBER,
        severity: severity,
        status: 'active',
        timestamp: serverTimestamp()
      });

      document.getElementById("status").innerText =
        "✅ " + severity.toUpperCase() + " alert sent!";
    } catch (err) {
      document.getElementById("status").innerText =
        "❌ Error sending alert";
      console.error(err);
    }
  }

  document.getElementById('critical').onclick = () => sendAlert('critical');
  document.getElementById('high').onclick = () => sendAlert('high');
  document.getElementById('medium').onclick = () => sendAlert('medium');
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Outfit', sans-serif;
    background: #0f0f13;
    color: #fff;
    margin: 0;
    padding: 20px;
  }

  h1 {
    text-align: center;
  }

  #alert-count {
    text-align: center;
    margin: 10px 0 20px;
    color: #aaa;
  }

  #alerts {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .alert-card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 12px;
  }

  .critical { border-left: 5px solid #E8342A; }
  .high { border-left: 5px solid #F26419; }
  .medium { border-left: 5px solid #FFD700; }

  button {
    margin-top: 10px;
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  .resolve { background: #2ecc71; }
  .logout {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #444;
  }
</style>
</head>

<body>

<button class="logout" onclick="logout()">Logout</button>

<h1>🚨 Live Alerts Dashboard</h1>
<h3 id="alert-count">Active Alerts: 0</h3>

<div id="alerts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDriQ0LoWT90BlzKhCvGF4kgW4cb24QhKU",
  authDomain: "vega-c7ee5.firebaseapp.com",
  projectId: "vega-c7ee5",
  storageBucket: "vega-c7ee5.firebasestorage.app",
  messagingSenderId: "1000278564320",
  appId: "1:1000278564320:web:42489358067051edd61f85"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();

// 🔐 AUTH CHECK
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});

// Logout
window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};

const alertsDiv = document.getElementById("alerts");

// 🔊 BUILT-IN BEEP SOUND
function playBeep() {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();

  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  oscillator.type = "sine";
  oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);

  gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);

  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 0.3);
}

// Enable sound after first click
document.body.addEventListener("click", () => {
  playBeep();
}, { once: true });

// ✅ Update alert count
function updateAlertCount() {
  const count = document.querySelectorAll('.alert-card').length;
  document.getElementById("alert-count").textContent =
    `Active Alerts: ${count}`;
}

// 🔔 Popup notification
function simulateNotification(msg){
  const popup = document.createElement("div");
  popup.textContent = "🔔 " + msg;
  popup.style.position = "fixed";
  popup.style.top = "20px";
  popup.style.right = "20px";
  popup.style.background = "#333";
  popup.style.padding = "10px 15px";
  popup.style.borderRadius = "8px";
  popup.style.zIndex = "999";

  document.body.appendChild(popup);
  setTimeout(()=> popup.remove(), 3000);
}

// 🔄 Firestore listener
onSnapshot(collection(db, "alerts"), (snapshot) => {
  alertsDiv.innerHTML = "";

  snapshot.forEach((docSnap) => {
    const alert = docSnap.data();

    if (alert.status !== "active") return;

    const card = document.createElement("div");
    card.className = `alert-card ${alert.severity}`;

    card.innerHTML = `
      <strong>Room ${alert.room}</strong><br>
      ${alert.aiSummary}<br>
      <small>${alert.severity.toUpperCase()}</small><br>
      <button class="resolve">Mark Resolved</button>
    `;

    // Highlight critical alerts
    if(alert.severity === 'critical'){
      card.style.boxShadow = "0 0 15px rgba(232,52,42,0.7)";
    }

    // Resolve button
    card.querySelector(".resolve").onclick = async () => {
      await updateDoc(doc(db, "alerts", docSnap.id), {
        status: "resolved"
      });
    };

    alertsDiv.prepend(card);

    // 🔔 Popup
    simulateNotification(`Room ${alert.room}: ${alert.aiSummary}`);

    // 🔊 Beep for critical alerts
    if(alert.severity === 'critical'){
      playBeep();
      setTimeout(playBeep, 300);
    }
  });

  updateAlertCount();
});

</script>

</body>
</html>
